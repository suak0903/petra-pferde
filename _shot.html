<!doctype html><html><head><meta charset="utf-8"><style>body{margin:0}iframe{border:0;width:1440px;height:880px;display:block}</style></head>
<body><iframe id="f"></iframe>
<script>
const q=new URLSearchParams(location.search);
const f=document.getElementById('f');
f.src=(q.get('page')||'index.html');
f.addEventListener('load',()=>{setTimeout(()=>{
  const d=f.contentDocument,t=q.get('to');
  if(t){const el=d.getElementById(t);if(el)f.contentWindow.scrollTo(0,el.getBoundingClientRect().top+f.contentWindow.scrollY-70);}
},1200)});
</script></body></html>
